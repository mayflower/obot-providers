name: "Dex"
command: "dex-auth-provider/bin/obot-provider"
icon: "https://raw.githubusercontent.com/dexidp/dex/master/Documentation/logos/dex-horizontal-color.png"
description: "Auth provider for Dex (or any standards-compliant OIDC issuer)"
link: "https://dexidp.io/"
requiredConfigurationParameters:
  - name: "OBOT_DEX_AUTH_PROVIDER_CLIENT_ID"
    friendlyName: "Client ID"
    description: "Dex static client identifier. Configured under staticClients[*].id in your Dex values."
    sensitive: false
  - name: "OBOT_DEX_AUTH_PROVIDER_CLIENT_SECRET"
    friendlyName: "Client Secret"
    description: "Dex static client secret. Configured via Dex's secret env or staticClients[*].secret."
    sensitive: true
  - name: "OBOT_DEX_AUTH_PROVIDER_ISSUER_URL"
    friendlyName: "Issuer URL"
    description: "Base URL of the Dex issuer, e.g. https://id.example.com. Must serve /.well-known/openid-configuration."
    sensitive: false
  - name: "OBOT_AUTH_PROVIDER_COOKIE_SECRET"
    friendlyName: "Cookie Secret"
    description: "Secret used to encrypt cookies. Must be a random string of length 16, 24, or 32."
    sensitive: true
    hidden: true
  - name: "OBOT_AUTH_PROVIDER_EMAIL_DOMAINS"
    friendlyName: "Allowed E-Mail Domains"
    description: "A list of email domains that are allowed to authenticate with this provider. * is a special value that allows all domains."
    sensitive: false
optionalConfigurationParameters:
  - name: "OBOT_DEX_AUTH_PROVIDER_SCOPES"
    friendlyName: "OIDC Scopes"
    description: "Space-separated OIDC scopes to request. Defaults to: openid email profile"
    sensitive: false
  - name: "OBOT_AUTH_PROVIDER_POSTGRES_CONNECTION_DSN"
    friendlyName: "PostgreSQL connection string (DSN)"
    description: "The connection string for a PostgreSQL database to use for session storage. If unset, cookies will be used for session storage instead."
    sensitive: true
    hidden: true
  - name: "OBOT_AUTH_PROVIDER_TOKEN_REFRESH_DURATION"
    friendlyName: "Token Refresh Duration"
    description: "Time to wait before attempting to refresh auth tokens. Should be in a format like 1h1m1s. Default: 1h"
    sensitive: false
  - name: "OBOT_AUTH_PROVIDER_ENABLE_LOGGING"
    friendlyName: "Enable Logging"
    description: "Set to true to enable request, auth, and standard logging for the auth provider. Default: false"
    sensitive: false
postgresTablePrefix: "dex_"
